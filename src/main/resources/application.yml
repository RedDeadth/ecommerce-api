server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:ecommercedb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: false
    baseline-on-migrate: true

jwt:
  secret: Y29tLmVjb21tZXJjZS5hcGkuc2VjcmV0LmtleS5mb3Iuand0LnRva2VuLmdlbmVyYXRpb24=
  expiration: 86400000

springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: method
